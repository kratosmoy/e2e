ext {
    areaBaseUrl = 'https://playwright.dev'
    areaGlue = 'com.example.e2e.core.hooks,com.example.e2e.tests.demoapp.steps'
    areaRunnerClass = 'com.example.e2e.tests.demoapp.runner.RunCucumberTest'
    areaParallelEnabled = false
    areaParallelism = 1
}

test {
    filter {
        includeTestsMatching(areaRunnerClass)
        failOnNoMatchingTests = true
    }

    systemProperty 'base.url', areaBaseUrl
    systemProperty 'cucumber.glue', areaGlue
    systemProperty 'cucumber.execution.parallel.enabled', areaParallelEnabled.toString()

    if (areaParallelEnabled) {
        systemProperty 'cucumber.execution.parallel.config.strategy', 'fixed'
        systemProperty 'cucumber.execution.parallel.config.fixed.parallelism', areaParallelism.toString()
    }
}
